<!DOCTYPE html>
<html>
<head>
    <title>Exam Paper Generator</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 180px;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            margin-right: 5px;
        }

        /* Tabloid Layout */
        #paper {
            width: 1112px;   /* 27.9cm approx */
            min-height: 1728px; /* 43.2cm approx */
            border: 1px solid #000;
            padding: 20px;
            margin-top: 20px;
        }

        .columns {
            display: flex;
            gap: 20px;
        }

        .col {
            width: 50%;
        }

        .question {
            margin-top: 15px;
            cursor: move;
        }

        .option {
            margin-left: 15px;
        }

        .option-row {
            display: flex;
            justify-content: space-between;
            margin-left: 15px;
        }

        .option-row span {
            width: 48%;
        }

        .dragging {
            opacity: 0.5;
        }
    </style>
</head>

<body>

<h2>📄 Exam Paper Generator</h2>

<textarea id="inputText" placeholder="Paste questions..."></textarea><br>

<button onclick="formatText()">Generate</button>
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="makeBold()">Bold</button>
<button onclick="makeNormal()">Normal</button>

<div id="paper" contenteditable="true"></div>

<script>
function formatText() {

    let text = document.getElementById("inputText").value;
    let lines = text.split("\n");

    let questions = [];
    let currentQ = "";
    let optionBuffer = [];

    function processOptions(buffer) {

        if (!currentQ) return;

        let noPair = buffer.some(line => {
            let txt = line.replace(/^\([A-Da-d]\)\s*/, "").trim();
            return txt.length > 18;
        });

        if (noPair) {
            buffer.forEach(line => {
                currentQ += `<div class="option" contenteditable="true">${line}</div>`;
            });
        } else {
            for (let i = 0; i < buffer.length; i += 2) {
                currentQ += `<div class="option-row">
                                <span contenteditable="true">${buffer[i] || ""}</span>
                                <span contenteditable="true">${buffer[i+1] || ""}</span>
                             </div>`;
            }
        }

        currentQ += `<div style="height:10px;"></div>`;
    }

    let i = 0;

    while (i < lines.length) {

        let line = lines[i].trim();
        if (!line) { i++; continue; }

        if (/^\d+\./.test(line)) {

            processOptions(optionBuffer);
            optionBuffer = [];

            if (currentQ) questions.push(currentQ);

            let questionLines = [line];
            i++;

            while (i < lines.length && 
                   !lines[i].trim().match(/^\([A-Da-d]\)/) && 
                   !lines[i].trim().match(/^\d+\./)) {

                if (lines[i].trim() !== "") {
                    questionLines.push(lines[i].trim());
                }
                i++;
            }

            let fullQuestion = questionLines.join(" ");

            let match = fullQuestion.match(/^(\d+\.\s*.*?[?—:])/);

            if (match) {
                let boldPart = match[1];
                let rest = fullQuestion.slice(boldPart.length);
                fullQuestion = `<b contenteditable="true">${boldPart}</b>${rest}`;
            }

            currentQ = `<div class="question" draggable="true">${fullQuestion}</div>`;
            continue;
        }

        if (/^\([A-Da-d]\)/.test(line)) {
            optionBuffer.push(line);
        }

        i++;
    }

    processOptions(optionBuffer);
    if (currentQ) questions.push(currentQ);

    // 2 COLUMN SPLIT
    let left = questions.slice(0, 15).join("");
    let right = questions.slice(15).join("");

    let finalHTML = `
        <div class="columns">
            <div class="col" id="left-col">${left}</div>
            <div class="col" id="right-col">${right}</div>
        </div>
    `;

    let paperDiv = document.getElementById("paper");
    paperDiv.innerHTML = finalHTML;

    // DRAG & DROP REORDER
    let draggables = paperDiv.querySelectorAll('.question');
    let dragged = null;

    draggables.forEach(item => {
        item.addEventListener('dragstart', e => {
            dragged = item;
            item.classList.add('dragging');
        });
        item.addEventListener('dragend', e => {
            dragged = null;
            item.classList.remove('dragging');
        });
    });

    let columns = paperDiv.querySelectorAll('.col');
    columns.forEach(col => {
        col.addEventListener('dragover', e => {
            e.preventDefault();
            const afterElement = getDragAfterElement(col, e.clientY);
            if (afterElement == null) {
                col.appendChild(dragged);
            } else {
                col.insertBefore(dragged, afterElement);
            }
        });
    });

    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.question:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }
}

// ✅ Make selected text bold
function makeBold() {
    document.execCommand('bold');
}

// ✅ Make selected text normal (remove bold)
function makeNormal() {
    document.execCommand('removeFormat');
}

// PDF Download (Tabloid)
function downloadPDF() {
    let element = document.getElementById("paper");

    let opt = {
        margin: 5,
        filename: 'exam-paper.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: [279, 432], orientation: 'portrait' } 
    };

    html2pdf().set(opt).from(element).save();
}
</script>

</body>
</html>
