<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>By Maverix</title>

<style>
body {
    font-family: Poppins, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    margin: 0;
    padding: 20px;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

textarea {
    width: 100%;
    height: 200px;
    border-radius: 12px;
    border: none;
    padding: 12px;
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
}

button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    font-size: 12px;
}

button:hover {
    transform: scale(1.05);
    filter: brightness(1.2);
}

.convert-btn {background: linear-gradient(135deg, #3b82f6, #06b6d4); box-shadow: 0 0 15px #3b82f6; color: white;}
.download-btn {background: linear-gradient(135deg, #22c55e, #4ade80); box-shadow: 0 0 15px #22c55e; color: black;}
.ai-btn {background: linear-gradient(135deg, #00c6ff, #0072ff); box-shadow: 0 0 15px #0072ff; color: white;}
.follow-btn {background: linear-gradient(135deg, #9333ea, #f43f5e); box-shadow: 0 0 15px #9333ea; color: white; padding: 8px 15px;}
.help-btn {background: linear-gradient(135deg, #f59e0b, #f97316); box-shadow: 0 0 15px #f59e0b; color: black; padding: 8px 12px; margin-left: 10px;}

.btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 15px;
}

#paper {
    margin-top: 20px;
    color: black;
    outline: none;
}

.page-preview {
    width: 1102px;  /* tabloid width in px approx */
    min-height: 1587px; /* tabloid height in px approx */
    background: white;
    margin-bottom: 20px;
    padding: 20px;
    border-radius: 10px;
    box-sizing: border-box;
    display: flex;
}

.col {
    width: 45%;
}

.gap {
    width: 10%;
}

.question-block {margin-bottom:8px;}
.question {font-size:13px; margin-bottom:5px;}
.option-row {display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;}

.ai-popup {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:999;}
.ai-box {background:#111; padding:25px; border-radius:15px; text-align:center; box-shadow:0 0 30px #00c6ff;}
</style>

</head>
<body>

<div class="container">

    <div class="header">
        <h2>📝 Exam Paper Formatter</h2>
        <div>
            <button class="help-btn" onclick="showManual()">?</button>
            <button class="follow-btn" onclick="followCreator()">🔥 Follow</button>
        </div>
    </div>

    <textarea id="inputText" placeholder="Paste questions..."></textarea>

    <div class="btn-group">
        <button class="convert-btn" onclick="playConvert(); formatText()">⚡ Convert</button>
        <button class="download-btn" onclick="playDownload(); downloadPDF()">📥 Download PDF</button>
        <button class="ai-btn" onclick="showAI()">🤖 AI Answer</button>
        <button onclick="makeBold()">🅱 Bold</button>
        <button onclick="makeNormal()">Normal</button>
        <button onclick="undoEdit()">↩ Undo</button>
    </div>

    <div id="paper" contenteditable="true"></div>
</div>

<div id="aiPopup" class="ai-popup">
    <div class="ai-box">
        <h2>🚀 Coming Soon</h2>
        <p>AI Answer feature will auto-generate answers soon!</p>
        <button onclick="closeAI()">OK</button>
    </div>
</div>

<audio id="convertSound" src="H.mp3"></audio>
<audio id="downloadSound" src="O.mp3"></audio>
<audio id="followSound" src="S.mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
let historyStack = [];
let paper = document.getElementById("paper");

function saveState(){ historyStack.push(paper.innerHTML); }
function makeBold(){ saveState(); document.execCommand("bold"); }
function makeNormal(){ saveState(); document.execCommand("removeFormat"); }
function undoEdit(){ if(historyStack.length>0){ paper.innerHTML = historyStack.pop(); }}
function showAI(){ document.getElementById("aiPopup").style.display="flex"; }
function closeAI(){ document.getElementById("aiPopup").style.display="none"; }
function playConvert(){ document.getElementById("convertSound").play(); }
function playDownload(){ document.getElementById("downloadSound").play(); }
function followCreator(){ document.getElementById("followSound").play(); window.open("https://instagram.com/itz_maverix","_blank"); }
function showManual(){ alert(`📘 HOW TO USE\n\n1. Paste questions properly\n2. Click Convert\n3. Select text → use Bold / Normal buttons\n4. Download PDF`); }

// ✅ FORMAT QUESTIONS + PAGE SPLIT WITH 45-10-45 RATIO
function formatText(){
    let text = document.getElementById("inputText").value;
    let lines = text.split("\n");
    let questions = [];
    let currentQ = "";
    let optionBuffer = [];

    function processOptions(buffer){
        if(!currentQ) return;
        currentQ += `<div style="margin-top:5px;"></div>`;
        if(buffer.length === 4){
            currentQ += `<div class="option-row"><span>${buffer[0]}</span><span>${buffer[1]}</span></div>`;
            currentQ += `<div class="option-row"><span>${buffer[2]}</span><span>${buffer[3]}</span></div>`;
        }else{
            buffer.forEach(line=> currentQ+=`<div class="option-row"><span>${line}</span></div>`);
        }
        currentQ += `</div>`; // close question-block
        questions.push(currentQ);
    }

    let i=0;
    while(i<lines.length){
        let line = lines[i].trim();
        if(!line){ i++; continue; }

        if(/^\d+\./.test(line)){
            processOptions(optionBuffer);
            optionBuffer=[];
            currentQ="";
            let qLines=[line]; i++;
            while(i<lines.length && !lines[i].trim().match(/^\([A-Da-d]\)/) && !lines[i].trim().match(/^\d+\./)){
                if(lines[i].trim()!=="") qLines.push(lines[i].trim());
                i++;
            }
            let fullQ=qLines.join(" ");
            let match=fullQ.match(/^(\d+\.\s*.*?[?—:])/);
            if(match){
                let boldPart=match[1];
                let rest=fullQ.slice(boldPart.length);
                fullQ=`<b>${boldPart}</b>${rest}`;
            }
            currentQ=`<div class="question-block"><div class="question">${fullQ}</div>`;
            continue;
        }
        if(/^\([A-Da-d]\)/.test(line)) optionBuffer.push(line);
        i++;
    }
    processOptions(optionBuffer);

    // ✅ Split into pages: 38 questions per page (19 left + 19 right)
    let pages=[];
    for(let p=0;p<questions.length;p+=38){
        let chunk=questions.slice(p,p+38);
        let left=chunk.slice(0,19).join("");
        let right=chunk.slice(19).join("");
        pages.push(`<div class="page-preview"><div class="col">${left}</div><div class="gap"></div><div class="col">${right}</div></div>`);
    }
    paper.innerHTML=pages.join("");
}

// ✅ DOWNLOAD PDF
function downloadPDF(){
    let element=paper;
    let opt={
        margin:0,
        filename:'Question_Paper.pdf',
        image:{type:'jpeg',quality:1},
        html2canvas:{scale:2},
        jsPDF:{unit:'px',format:[1102,1587]}
    };
    html2pdf().set(opt).from(element).save();
}
</script>
</body>
</html>
