<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Formatter</title>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
    font-family: Arial;
    padding: 20px;
}
textarea {
    width: 100%;
    height: 150px;
    padding: 10px;
}
#output {
    white-space: pre-wrap;
    margin-top: 20px;
    padding: 10px;
    border: 1px solid #ccc;
    min-height: 150px;
}
</style>
</head>

<body>

<h2>🔥 Smart Question Formatter</h2>

<textarea id="inputText" placeholder="Paste questions here..."></textarea><br>

<button onclick="formatText()">Format</button>
<button onclick="downloadPDF()">Download PDF</button>

<div id="output" contenteditable="true"></div>

<script>
function formatText() {
    let text = document.getElementById("inputText").value;

    // Match: number. ... ? OR —
    let formatted = text.replace(/\d+\.[^\n?—]*(\?|—)/g, function(match) {
        return "<b>" + match + "</b>";
    });

    document.getElementById("output").innerHTML = formatted;
}

async function downloadPDF() {
    const { jsPDF } = window.jspdf;

    let element = document.getElementById("output");

    let canvas = await html2canvas(element);
    let imgData = canvas.toDataURL("image/png");

    let pdf = new jsPDF('p', 'mm', 'a4');

    let imgWidth = 210;
    let pageHeight = 297;
    let imgHeight = canvas.height * imgWidth / canvas.width;

    let heightLeft = imgHeight;
    let position = 0;

    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    while (heightLeft > 0) {
        position = heightLeft - imgHeight;
        pdf.addPage();
        pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
        heightLeft -= pageHeight;
    }

    pdf.save("Exam_Output.pdf");
}
</script>

</body>
</html>
