<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Created by Rahul</title>

<style>
body {
    font-family: Poppins, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    margin: 0;
    padding: 20px;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

textarea {
    width: 100%;
    height: 200px;
    border-radius: 12px;
    border: none;
    padding: 12px;
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
}

button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    filter: brightness(1.2);
}

.convert-btn {
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    box-shadow: 0 0 15px #3b82f6;
    color: white;
}

.download-btn {
    background: linear-gradient(135deg, #22c55e, #4ade80);
    box-shadow: 0 0 15px #22c55e;
    color: black;
}

/* 🔥 AI BUTTON */
.ai-btn {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    box-shadow: 0 0 15px #0072ff;
    color: white;
}

/* FOLLOW */
.follow-btn {
    background: linear-gradient(135deg, #9333ea, #f43f5e);
    box-shadow: 0 0 15px #9333ea;
    color: white;
    padding: 8px 15px;
}

/* HELP */
.help-btn {
    background: linear-gradient(135deg, #f59e0b, #f97316);
    box-shadow: 0 0 15px #f59e0b;
    color: black;
    padding: 8px 12px;
    margin-left: 10px;
}

.btn-group {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

#paper {
    margin-top: 20px;
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
}

.columns {
    display: flex;
    gap: 20px;
}

.col {
    width: 50%;
}

.question {
    font-size: 13px;
    margin-bottom: 5px;
}

.option {
    margin-left: 10px;
    font-size: 12px;
}

.option-row {
    display: flex;
    justify-content: space-between;
    margin-left: 10px;
    font-size: 12px;
}

/* 🤖 POPUP */
.ai-popup {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.ai-box {
    background:#111;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 30px #00c6ff;
}
</style>

</head>

<body>

<div class="container">

    <div class="header">
        <h2>📝 Exam paper Formatter</h2>
        <div>
            <button class="help-btn" onclick="showManual()">?</button>
            <button class="follow-btn" onclick="followCreator()">🔥 Follow</button>
        </div>
    </div>

    <textarea id="inputText" placeholder="Paste questions..."></textarea>

    <div class="btn-group">
        <button class="convert-btn" onclick="playConvert(); formatText()">⚡ Convert</button>
        <button class="download-btn" onclick="playDownload(); downloadPDF()">📥 Download PDF</button>
        <button class="ai-btn" onclick="showAI()">🤖 AI Answer</button>
    </div>

    <div id="paper"></div>
</div>

<!-- 🤖 POPUP -->
<div id="aiPopup" class="ai-popup">
    <div class="ai-box">
        <h2>🚀 Coming Soon</h2>
        <p>AI Answer feature will auto-generate answers soon!</p>
        <button onclick="closeAI()">OK</button>
    </div>
</div>

<audio id="convertSound" src="H.mp3"></audio>
<audio id="downloadSound" src="O.mp3"></audio>
<audio id="followSound" src="S.mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

function showAI(){
    document.getElementById("aiPopup").style.display="flex";
}

function closeAI(){
    document.getElementById("aiPopup").style.display="none";
}

function playConvert() {
    document.getElementById("convertSound").play();
}

function playDownload() {
    document.getElementById("downloadSound").play();
}

function followCreator() {
    document.getElementById("followSound").play();
    window.open("https://instagram.com/itz_maverix", "_blank");
}

function showManual(){
alert(
`📘 HOW TO USE

1. Paste questions properly
2. Click Convert
3. Download PDF

⚙️ FEATURES:
✔ Auto Format
✔ 2 Column Layout
✔ Smart Options

⚠️ LIMIT:
Max 32 Questions

🤖 AI Answer:
Coming Soon`
);
}

function formatText() {

    let text = document.getElementById("inputText").value;
    let lines = text.split("\n");

    let questions = [];
    let currentQ = "";
    let optionBuffer = [];

    function processOptions(buffer) {

        if (!currentQ) return;

        let noPair = buffer.some(line => {
            let txt = line.replace(/^\([A-Da-d]\)\s*/, "").trim();
            return txt.length > 18;
        });

        currentQ += `<div style="margin-top:5px;"></div>`;

        if (noPair) {
            buffer.forEach(line => {
                currentQ += `<div class="option">${line}</div>`;
            });
        } else {
            for (let i = 0; i < buffer.length; i += 2) {
                currentQ += `<div class="option-row">
                                <span>${buffer[i] || ""}</span>
                                <span>${buffer[i+1] || ""}</span>
                             </div>`;
            }
        }

        currentQ += `<div style="height:12px;"></div>`;
    }

    let i = 0;

    while (i < lines.length) {

        let line = lines[i].trim();
        if (!line) { i++; continue; }

        if (/^\d+\./.test(line)) {

            processOptions(optionBuffer);
            optionBuffer = [];

            if (currentQ) questions.push(currentQ);

            let questionLines = [line];
            i++;

            while (i < lines.length &&
                   !lines[i].trim().match(/^\([A-Da-d]\)/) &&
                   !lines[i].trim().match(/^\d+\./)) {

                if (lines[i].trim() !== "") {
                    questionLines.push(lines[i].trim());
                }
                i++;
            }

            let fullQuestion = questionLines.join(" ");

            let match = fullQuestion.match(/^(\d+\.\s*.*?[?—:])/);

            if (match) {
                let boldPart = match[1];
                let rest = fullQuestion.slice(boldPart.length);
                fullQuestion = `<b>${boldPart}</b>${rest}`;
            }

            currentQ = `<div class="question">${fullQuestion}</div>`;
            continue;
        }

        if (/^\([A-Da-d]\)/.test(line)) {
            optionBuffer.push(line);
        }

        i++;
    }

    processOptions(optionBuffer);
    if (currentQ) questions.push(currentQ);

    if(questions.length > 32){
        alert("Max 32 questions allowed!");
        return;
    }

    let left = questions.slice(0, 16).join("");
    let right = questions.slice(16).join("");

    document.getElementById("paper").innerHTML = `
        <div class="columns">
            <div class="col">${left}</div>
            <div class="col">${right}</div>
        </div>
    `;
}

function downloadPDF() {

    let element = document.getElementById("paper");

    let opt = {
        margin: 10,
        filename: 'Question_Paper.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4' }
    };

    html2pdf().set(opt).from(element).save();
}

</script>

</body>
</html>
