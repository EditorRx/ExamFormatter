<!DOCTYPE html>
<html>
<head>
    <title>Exam Paper Generator</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        body {
            font-family: 'Poppins', Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: #1e293b;
        }

        h2 {
            text-align: center;
            color: #0f172a;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        textarea {
            width: 100%;
            height: 180px;
            border: 2px solid #0f172a;
            border-radius: 10px;
            padding: 10px;
            font-size: 16px;
            resize: none;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.85;
        }

        #controls button {
            background: #0f172a;
            color: #fff;
        }

        #formatButtons button {
            background: #f97316;
            color: #fff;
            margin-right: 5px;
        }

        /* ========================= OUTPUT AREA STYLE ========================= */
        #paper {
            width: 794px;   /* A4 width */
            min-height: 1123px;
            border: 2px solid #ccc;
            padding: 20px;
            margin: 20px 8px; /* top/bottom 20px, left/right 8px */
            border-radius: 10px;
            background: #ffffff; /* WHITE BACKGROUND */
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            color: #1e293b;
        }

        .columns {
            display: flex;
            gap: 20px;
        }

        .col {
            width: 50%;
        }

        .question {
            margin-top: 15px;
            font-size: 16px;
            line-height: 1.5;
        }

        .option, .option-row {
            margin-top: 4px; /* spacing between option rows */
        }

        .option-row {
            display: flex;
            justify-content: space-between;
        }

        .option-row span {
            width: 48%;
        }

        .vertical-option span {
            display: block;
            margin-left: 0;
            margin-top: 3px;
        }
    </style>
</head>

<body>

<h2>📄 Exam Paper Generator</h2>

<textarea id="inputText" placeholder="Paste questions..."></textarea><br>

<div id="controls">
    <button onclick="formatText()">Generate</button>
    <button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="formatButtons">
    <button onclick="makeBold()">Bold</button>
    <button onclick="makeNormal()">Normal</button>
</div>

<div id="paper" contenteditable="true"></div>

<script>
function formatText() {

    let text = document.getElementById("inputText").value;
    let lines = text.split("\n");

    let questions = [];
    let currentQ = "";
    let optionBuffer = [];

    function processOptions(buffer, isAssertion=false) {
        if (!currentQ) return;

        if (isAssertion) {
            buffer.forEach(line => {
                currentQ += `<div class="option vertical-option"><span>${line}</span></div>`;
            });
        } else {
            let noPair = buffer.some(line => {
                let txt = line.replace(/^\([A-Da-d]\)\s*/, "").trim();
                return txt.length > 18;
            });

            if (noPair) {
                buffer.forEach(line => {
                    currentQ += `<div class="option">${line}</div>`;
                });
            } else {
                for (let i = 0; i < buffer.length; i += 2) {
                    currentQ += `<div class="option-row">
                                    <span>${buffer[i] || ""}</span>
                                    <span>${buffer[i+1] || ""}</span>
                                 </div>`;
                }
            }
        }

        currentQ += `<div style="height:4px;"></div>`; // row spacing
    }

    let i = 0;

    while (i < lines.length) {

        let line = lines[i].trim();
        if (!line) { i++; continue; }

        if (/^\d+\./.test(line)) {

            processOptions(optionBuffer);
            optionBuffer = [];

            if (currentQ) questions.push(currentQ);

            let questionLines = [line];
            i++;

            while (i < lines.length && 
                   !lines[i].trim().match(/^\([A-Da-d]\)/) && 
                   !lines[i].trim().match(/^\d+\./)) {

                if (lines[i].trim() !== "") {
                    questionLines.push(lines[i].trim());
                }
                i++;
            }

            let fullQuestion = questionLines.join(" ");

            let match = fullQuestion.match(/^(\d+\.\s*.*?[?—:])/);
            if (match) {
                let boldPart = match[1];
                let rest = fullQuestion.slice(boldPart.length);
                fullQuestion = `<b>${boldPart}</b>${rest}`;
            }

            currentQ = `<div class="question">${fullQuestion}</div>`;
            continue;
        }

        if (/^\([A-Da-d]\)/.test(line)) {
            optionBuffer.push(line);
        }

        if (/Assertion\s*:/i.test(currentQ)) {
            processOptions(optionBuffer, true);
            optionBuffer = [];
        }

        i++;
    }

    processOptions(optionBuffer);
    if (currentQ) questions.push(currentQ);

    let left = questions.slice(0, 15).join("");
    let right = questions.slice(15).join("");

    let finalHTML = `
        <div class="columns">
            <div class="col">${left}</div>
            <div class="col">${right}</div>
        </div>
    `;

    document.getElementById("paper").innerHTML = finalHTML;
}

function downloadPDF() {
    let element = document.getElementById('paper');
    html2pdf().from(element).save('ExamPaper.pdf');
}

function makeBold() {
    document.execCommand('bold');
}

function makeNormal() {
    document.execCommand('removeFormat');
}
</script>

</body>
</html>
